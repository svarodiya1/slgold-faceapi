<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Face Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #111118;
            border-bottom: 1px solid #222;
        }
        .topbar .brand { color: #dcb400; font-weight: 700; font-size: 1.1em; }
        .topbar a {
            color: #888;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 14px;
            border: 1px solid #333;
            border-radius: 6px;
        }
        .topbar a:hover { border-color: #666; color: #fff; }

        .main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { margin-bottom: 5px; font-size: 1.8em; }
        .subtitle { color: #888; margin-bottom: 30px; }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            flex: 1;
            background: #111118;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: 700; color: #00dc52; }
        .stat-card .label { color: #888; font-size: 0.85em; margin-top: 5px; }

        .section-title {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #ccc;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        /* User Cards Grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: #111118;
            border: 1px solid #1a1a2e;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .user-card:hover {
            border-color: #333;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .user-card-image {
            width: 100%;
            height: 220px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .user-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-card-image .no-image {
            font-size: 4em;
            color: #333;
        }
        .user-card-image .id-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00a0dc;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .user-card-body {
            padding: 16px;
        }
        .user-card-name {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .user-card-actions {
            display: flex;
            gap: 8px;
        }

        .delete-btn {
            flex: 1;
            background: none;
            border: 1px solid #dc0000;
            color: #dc0000;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #dc0000; color: #fff; }

        .empty-state {
            text-align: center;
            color: #555;
            padding: 60px 40px;
            background: #111118;
            border-radius: 12px;
            border: 1px dashed #333;
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 10px; }

        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 20px; border-radius: 8px;
            font-size: 0.9em; z-index: 1000;
            transform: translateX(120%); transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #0d2818; border: 1px solid #00dc52; color: #00dc52; }
        .toast.error { background: #200a0a; border: 1px solid #dc0000; color: #dc0000; }

        @media (max-width: 600px) {
            .users-grid { grid-template-columns: 1fr; }
            .user-card-image { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="brand">&#128272; Admin Panel</span>
        <div>
            <a href="/">&#8592; Main Gate</a>
            <a href="/admin/logout" style="margin-left:8px; border-color:#dc0000; color:#dc0000;">Logout</a>
        </div>
    </div>

    <div class="main">
        <h1>User Management</h1>
        <p class="subtitle">Manage registered faces and access control</p>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalUsers">0</div>
                <div class="label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="number" style="color:#00a0dc">&#128274;</div>
                <div class="label">System Active</div>
            </div>
        </div>

        <div class="section-title">Registered Users</div>
        <div class="users-grid" id="usersList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const data = await res.json();

                document.getElementById('totalUsers').textContent = data.count;

                const list = document.getElementById('usersList');
                if (data.users.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">&#128100;</div>
                            <p>No users registered yet.</p>
                        </div>`;
                } else {
                    list.innerHTML = data.users.map(u => `
                        <div class="user-card" id="user-${u.id}">
                            <div class="user-card-image">
                                ${u.face_image
                                    ? `<img src="${u.face_image}" alt="${u.name}">`
                                    : '<div class="no-image">&#128100;</div>'}
                                <span class="id-badge">ID: ${u.id}</span>
                            </div>
                            <div class="user-card-body">
                                <div class="user-card-name">${u.name}</div>
                                <div class="user-card-actions">
                                    <button class="delete-btn" onclick="deleteUser('${u.name}', ${u.id})">
                                        &#128465; Delete User
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('usersList').innerHTML =
                    '<div class="empty-state"><p>Error loading users</p></div>';
            }
        }

        async function deleteUser(name, id) {
            if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;

            try {
                const res = await fetch(`/api/users/${encodeURIComponent(name)}`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    showToast(`${name} deleted`, 'success');
                    document.getElementById(`user-${id}`).remove();
                    const count = document.getElementById('totalUsers');
                    count.textContent = parseInt(count.textContent) - 1;
                } else {
                    showToast(data.error || 'Error', 'error');
                }
            } catch (e) {
                showToast('Server error', 'error');
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        loadUsers();
    </script>
</body>
</html>
