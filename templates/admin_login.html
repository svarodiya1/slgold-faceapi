<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Face Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; max-width: 400px; width: 90%; }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #666; text-decoration: none; font-size: 0.9em;
        }
        .back-link:hover { color: #fff; }

        h1 { color: #dcb400; margin-bottom: 5px; font-size: 1.6em; }
        .subtitle { color: #888; margin-bottom: 30px; }

        .login-box {
            background: #111118;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 30px;
        }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            background: #0a0a0f;
            color: #fff;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
        }
        .input-group input:focus { border-color: #dcb400; }
        .input-group label {
            display: block; text-align: left;
            margin-bottom: 6px; color: #888; font-size: 0.85em;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #dcb400;
            color: #000;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #ffcc00; }
        .error-msg {
            background: #200a0a;
            border: 1px solid #dc0000;
            color: #dc0000;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; Back</a>
    <div class="container">
        <h1>&#128272; Admin Login</h1>
        <p class="subtitle">Access the admin panel to manage users</p>

        <div class="login-box">
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="admin" required autofocus>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
